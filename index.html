<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Escolinha Bateria Ritimao - Gaviões da Fiel</title>
    <style>
        /* CSS - Escolinha Bateria Ritimao */
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #111;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid #fff; padding-bottom: 10px; }
        .campo { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
        input, select, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #444;
            background: #222;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #000;
            border: none;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { background: #ccc; }
        button:disabled { background: #555; cursor: not-allowed; }
        .info-menor { background: #222; padding: 10px; border-left: 3px solid #fff; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Escolinha de Bateria Ritimão</h1>
    <p style="text-align: center; font-size: 0.8em; color: #888;">Cadastro de Alunos - Escolinha ano 26</p>
    
    <form id="formCadastro">
        <div class="campo">
            <label>Nome Completo:</label>
            <input type="text" id="nome" required>
        </div>
		
		<div class="campo">
			<label>CPF:</label>
			<input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" required>
		</div>

        <div class="campo" style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Idade:</label>
                <input type="number" id="idade" required onchange="verificarIdade(this.value)">
            </div>
            <div style="flex: 1;">
                <label>Sexo:</label>
                <select id="sexo" required>
                    <option value="">Selecione...</option>
                    <option value="Masculino">Masculino</option>
                    <option value="Feminino">Feminino</option>
                </select>
            </div>
        </div>

        <div id="secaoResponsavel" class="info-menor">
            <label>Nome do Responsável:</label>
            <input type="text" id="nomeResp">
            <label>Telefone do Responsável:</label>
            <input type="tel" id="telResp" placeholder="(99)99999-9999" maxlength="15">
        </div>

		<div class="campo">
			<label>Telefone (WhatsApp):</label>
			<input type="tel" id="telefone" placeholder="(99)99999-9999" maxlength="15" required>
		</div>

		<div class="campo">
			<label>E-mail:</label>
			<input type="email" id="email" required placeholder="exemplo@email.com">
		</div>

        <div class="campo">
            <label>Instrumento de Interesse (Apenas 1):</label>
            <select id="instrumento" required>
                <option value="">Selecione...</option>
                <option value="Cuíca">Cuíca</option>
                <option value="Chocalho">Chocalho</option>
                <option value="Xequeré">Xequeré</option>
                <option value="Tamborim">Tamborim</option>
                <option value="Timbal">Timbal</option>
                <option value="Caixa">Caixa</option>
                <option value="Repique">Repique</option>
                <option value="Surdo de Terceira">Surdo de Terceira</option>
                <option value="Surdo de Primeira">Surdo de Primeira</option>
                <option value="Surdo de Segunda">Surdo de Segunda</option>
            </select>
        </div>

        <div class="campo">
            <label>Nível:</label>
            <select id="nivel" required>
                <option value="Iniciante">Iniciante</option>
                <option value="Intermediário">Intermediário</option>
                <option value="Avançado">Avançado</option>
            </select>
        </div>

        <div class="campo">
            <label>É sócio da Torcida Gaviões da Fiel?</label>
            <select id="isSocio" onchange="toggleSocio(this.value)">
                <option value="Não">Não</option>
                <option value="Sim">Sim</option>
            </select>
            <input type="text" id="numSocio" placeholder="Número do sócio" style="display:none; margin-top:10px;">
        </div>

        <div class="campo">
            <label>Foto do Aluno:</label>
            <input type="file" id="foto" accept="image/*" required>
        </div>

        <div class="campo">
            <label>Observações:</label>
            <textarea id="obs" rows="3"></textarea>
        </div>

        <button type="submit" id="btnEnviar">Concluir Cadastro</button>
    </form>
</div>

<script>
    // --- CONFIGURAÇÃO ---
    const URL_PLANILHA = "https://script.google.com/macros/s/AKfycbz-EKSpDTJiAVaMl7po1sPTaDJSG1iW2lCe7bpCg5o8NLHBwnmUog6H4V9VrMx6yUCt/exec"; 

    function verificarIdade(idade) {
        const secao = document.getElementById('secaoResponsavel');
        secao.style.display = (idade > 0 && idade < 18) ? 'block' : 'none';
    }

    function toggleSocio(valor) {
        document.getElementById('numSocio').style.display = (valor === 'Sim') ? 'block' : 'none';
    }

    const converterBase64 = (file) => new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });

    document.getElementById('formCadastro').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;
        btn.innerText = "Enviando...";

        try {
            const arquivoFoto = document.getElementById('foto').files[0];
            const fotoBase64 = arquivoFoto ? await converterBase64(arquivoFoto) : "";

            const dados = {
                nome: document.getElementById('nome').value,
                idade: document.getElementById('idade').value,
                sexo: document.getElementById('sexo').value,
                telefone: document.getElementById('telefone').value,
                email: document.getElementById('email').value,
                instrumento: document.getElementById('instrumento').value,
                nivel: document.getElementById('nivel').value,
                socio: document.getElementById('isSocio').value,
                numSocio: document.getElementById('numSocio').value,
                responsavel: document.getElementById('nomeResp').value + " - " + document.getElementById('telResp').value,
                obs: document.getElementById('obs').value,
                fotoBase64: fotoBase64
            };

            const response = await fetch(URL_PLANILHA, {
				method: 'POST',
				body: JSON.stringify(dados)
			});

			const resultado = await response.json();

			if (resultado.result === "success") {
				alert("✅ " + resultado.message);
				document.getElementById('formCadastro').reset();
				verificarIdade(0);
			} else {
				alert("❌ Erro: " + resultado.message);
			}
	
	// Máscara de CPF (000.000.000-00)
		document.getElementById('cpf').addEventListener('input', function (e) {
		let x = e.target.value.replace(/\D/g, '').match(/(\d{0,3})(\d{0,3})(\d{0,3})(\d{0,2})/);
		e.target.value = !x[2] ? x[1] : x[1] + '.' + x[2] + (x[3] ? '.' + x[3] : '') + (x[4] ? '-' + x[4] : '');
	});

	// Máscara de Telefone ((99)99999-9999)
		document.getElementById('telefone').addEventListener('input', function (e) {
		let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
		e.target.value = !x[2] ? x[1] : '(' + x[1] + ')' + x[2] + (x[3] ? '-' + x[3] : '');
	});
</script>

</body>
</html>
